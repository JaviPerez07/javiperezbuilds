  <!-- Page-specific layout (linktree). Uses the same CSS variables as the home. -->
  <style>
    /* Global box-sizing + no horizontal overflow on this page */
    .links-page, .links-page * { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }

    /* ---- Page shell: vertically centered, safe-area aware top/bottom ---- */
    .links-page {
      min-height: 100svh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 40px)
        0
        calc(env(safe-area-inset-bottom, 0px) + 40px);
      position: relative;
      overflow: hidden;
    }
    /* Subtle coral aura behind the avatar, echoing the home's accent glows */
    .links-page::before {
      content: "";
      position: absolute;
      top: -10%;
      left: 50%;
      width: min(560px, 120vw);
      height: 560px;
      transform: translateX(-50%);
      background: radial-gradient(circle, var(--accent-soft) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ---- Single central container: ONE max-width + ONE side padding.
       Avatar, text and every button live inside and share these exact
       margins, so all left/right edges line up perfectly. ---- */
    .links-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      margin-inline: auto;
      padding-inline: clamp(16px, 5vw, 24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ---- Identity — regular vertical rhythm via consistent margin-top ---- */
    .links-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-subtle);
      box-shadow: 0 0 0 6px rgba(217, 119, 87, 0.06), 0 18px 40px -12px rgba(0, 0, 0, 0.6);
    }
    .links-name {
      margin-top: 18px;
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--text-primary);
    }
    .links-handle {
      margin-top: 6px;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .links-bio {
      margin-top: 14px;
      max-width: 32ch;          /* comfortable line length, never touches edges */
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text-secondary);
    }

    /* ---- Button list: full width of container, uniform gap ---- */
    .links-list {
      margin-top: 28px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    /* Every button shares: 100% width, same min-height, padding, radius */
    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      min-height: 54px;
      padding: 14px 20px;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 280ms var(--ease-out-quart),
        box-shadow 280ms var(--ease-out-quart),
        background 280ms ease,
        border-color 280ms ease;
    }
    .link-btn:active { transform: scale(0.985); }
    /* Icon + label centered together as a group */
    .link-btn .link-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-btn .link-icon svg { display: block; width: 20px; height: 20px; }
    /* Label as a column so an optional sublabel stacks under the main text */
    .link-btn .link-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-align: center;
      line-height: 1.25;
    }
    .link-btn .link-label-sub {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0;
      opacity: 0.85;
    }

    /* === Tier 1 — Primary (Telegram): coral fill, marked glow === */
    .link-btn--primary {
      background: var(--accent);
      color: var(--bg-base);
      box-shadow: 0 10px 28px -10px var(--accent-glow);
    }

    /* === Tier 1 — Feature (Quant Forensics): dark card, strong orange glow
       + accent border so it stands out without copying the coral fill === */
    .link-btn--feature {
      background:
        linear-gradient(180deg, rgba(217,119,87,0.16), rgba(217,119,87,0.05)),
        var(--bg-card);
      color: var(--text-primary);
      border: 1px solid rgba(217,119,87,0.55);
      box-shadow: 0 0 0 1px rgba(217,119,87,0.12), 0 8px 30px -8px var(--accent-glow);
    }
    .link-btn--feature .link-icon { color: var(--accent); }
    .link-btn--feature .link-label-sub { color: var(--accent); opacity: 1; }

    /* === Tier 2 — Secondary: outlined card, subtle accent on rest === */
    .link-btn--secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    /* Hover lift + glow only on devices that actually hover (desktop).
       Hierarchy: feature glow strongest, primary strong, secondary subtle. */
    @media (hover: hover) {
      .link-btn--primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 36px -10px var(--accent-glow), 0 0 48px -12px var(--accent-glow);
      }
      .link-btn--feature:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(217,119,87,0.25), 0 16px 40px -10px var(--accent-glow), 0 0 60px -10px var(--accent-glow);
      }
      .link-btn--secondary:hover {
        transform: translateY(-2px);
        border-color: rgba(217,119,87,0.45);
        box-shadow: 0 10px 26px -12px rgba(0,0,0,0.7), 0 0 22px -8px var(--accent-glow);
      }
    }

    /* ---- Footer ---- */
    .links-footer {
      margin-top: 28px;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .links-footer a { color: var(--text-secondary); text-decoration: none; }
    @media (hover: hover) { .links-footer a:hover { color: var(--accent); } }

    /* ---- Small phones (≤360px): slightly tighter, still uniform ---- */
    @media (max-width: 360px) {
      .links-name { font-size: 1.35rem; }
      .link-btn { font-size: 0.95rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .link-btn, .link-btn:hover, .link-btn:active { transition: none; transform: none; }
    }
  </style>
</head>

  <script src="scripts/founder-counter.js?v=2" defer></script>
  <script>
    // ---- Brand icon SVGs (reused by the render below) ----
    const ICONS = {
      telegram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71l-4.14-3.05-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>',
      services: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>',
      instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>',
      tiktok: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.3 2.1 1.6 3.7 3.9 3.9v2.7c-1.3.1-2.5-.2-3.9-1v5.9c0 3.4-2.6 5.6-5.7 5.6-3 0-5.3-2.3-5.3-5.3 0-3.1 2.6-5.5 6-5.1v2.8c-.5-.1-1-.2-1.4-.2-1.4 0-2.4 1-2.4 2.4 0 1.5 1.1 2.5 2.5 2.5 1.5 0 2.6-1.1 2.6-2.9V3h3.2z"/></svg>',
      quant: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/><path d="M8 11l2 2 3-4"/></svg>',
      bolt: '<span style="font-size:18px;line-height:1;">⚡</span>',
      wrench: '<span style="font-size:18px;line-height:1;">🔧</span>',
      chart: '<span style="font-size:18px;line-height:1;">📊</span>',
    };

    // ---- Edit this list to add / reorder buttons ----
    // type: 'primary' = highlighted (coral) · 'secondary' = outlined card
    // external: true opens in a new tab (target=_blank + rel=noopener)
    // icon: key into ICONS above (add a new SVG there to support more brands)
    // type: 'primary' = coral (Telegram) · 'feature' = highlighted w/ orange glow
    //       (Quant Forensics) · 'secondary' = outlined card w/ subtle glow on hover
    // sublabel: optional smaller second line (used for the founder-price note)
    const LINKS = [
      { icon: 'telegram',  label: 'Únete a mi Telegram', url: 'https://t.me/javiperezchallenger', type: 'primary', external: true },
      { icon: 'bolt',      label: 'Mis Skills — diagnóstico forense para Claude Code y Codex', sublabel: 'Webs y trading', founderCounter: true, url: 'skills.html', type: 'feature', external: false },
      { icon: 'services',  label: 'Mis servicios de IA', url: 'index.html', type: 'secondary', external: false },
      { icon: 'wrench',    label: 'Skills Web — encuentra y cobra', url: 'skills.html#web', type: 'secondary', external: false },
      { icon: 'chart',     label: 'El Polígrafo — tu backtest miente', url: 'skills/poligrafo.html', type: 'secondary', external: false },
      { icon: 'instagram', label: 'Instagram', url: 'https://www.instagram.com/javiperezbuilds/', type: 'secondary', external: true },
      { icon: 'tiktok',    label: 'TikTok', url: 'https://www.tiktok.com/@javiperezbuilds', type: 'secondary', external: true },
    ];

    (function renderLinks() {
      const list = document.getElementById('links-list');
      if (!list) return;
      list.innerHTML = ''; // replace the <noscript> fallback when JS is available
      for (const item of LINKS) {
        const a = document.createElement('a');
        a.className = 'link-btn link-btn--' + item.type;
        a.href = item.url;
        if (item.external) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
        const icon = document.createElement('span');
        icon.className = 'link-icon';
        icon.setAttribute('aria-hidden', 'true');
        icon.innerHTML = ICONS[item.icon] || '';
        const labelWrap = document.createElement('span');
        labelWrap.className = 'link-label';
        const main = document.createElement('span');
        main.className = 'link-label-main';
        main.textContent = item.label;
        labelWrap.appendChild(main);
        if (item.sublabel) {
          const sub = document.createElement('span');
          sub.className = 'link-label-sub';
          sub.textContent = item.sublabel;
          if (item.founderCounter) {
            // El texto lo rellena scripts/founder-counter.js (única fuente de verdad)
            sub.textContent += ' · ';
            const fc = document.createElement('span');
            fc.className = 'founder-counter';
            fc.setAttribute('data-format', 'short');
            fc.textContent = 'Precio fundador · hasta 15 jul';
            sub.appendChild(fc);
          }
          labelWrap.appendChild(sub);
        }
        a.append(icon, labelWrap);
        list.appendChild(a);
      }
    })();

    document.getElementById('links-year').textContent = new Date().getFullYear();
  </script>
