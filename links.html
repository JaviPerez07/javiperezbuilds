  <!-- Page-specific layout (linktree). Uses the same CSS variables as the home. -->
  <style>
    .links-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(2.5rem, 8vh, 5rem) 1.25rem 3rem;
      position: relative;
      overflow: hidden;
    }
    /* Subtle coral aura behind the avatar, echoing the home's accent glows */
    .links-page::before {
      content: "";
      position: absolute;
      top: -10%;
      left: 50%;
      width: min(560px, 120vw);
      height: 560px;
      transform: translateX(-50%);
      background: radial-gradient(circle, var(--accent-soft) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    .links-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ---- Identity ---- */
    .links-avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-subtle);
      box-shadow: 0 0 0 6px rgba(217, 119, 87, 0.06), 0 18px 40px -12px rgba(0, 0, 0, 0.6);
    }
    .links-name {
      margin-top: 1.1rem;
      font-family: 'Inter', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }
    .links-handle {
      margin-top: 0.3rem;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .links-bio {
      margin-top: 0.85rem;
      max-width: 22rem;
      font-size: 0.98rem;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    /* ---- Button list ---- */
    .links-list {
      margin-top: 2rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      min-height: 56px;
      padding: 0.95rem 1.4rem;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 280ms var(--ease-out-quart),
        box-shadow 280ms var(--ease-out-quart),
        background 280ms ease,
        border-color 280ms ease;
    }
    .link-btn:active { transform: scale(0.985); }
    /* Icon pinned to a fixed left position so every button's icon lines up
       vertically, while the label stays centered in the button. */
    .link-btn .link-icon {
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-btn .link-icon svg { display: block; width: 20px; height: 20px; }
    /* Label centered; reserve side padding so long labels never sit under the icon. */
    .link-btn .link-label {
      text-align: center;
      padding: 0 2rem;
    }

    /* Primary (most prominent) */
    .link-btn--primary {
      background: var(--accent);
      color: var(--bg-base);
      box-shadow: 0 10px 28px -10px var(--accent-glow);
    }
    .link-btn--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px -10px var(--accent-glow), 0 0 48px -12px var(--accent-glow);
    }

    /* Secondary (outlined card, matches site surfaces) */
    .link-btn--secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }
    .link-btn--secondary:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 14px 32px -14px rgba(0, 0, 0, 0.7);
    }

    /* ---- Footer ---- */
    .links-footer {
      margin-top: 2.5rem;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .links-footer a { color: var(--text-secondary); text-decoration: none; }
    .links-footer a:hover { color: var(--accent); }

    /* ---- Mobile optimisation (most traffic is IG/TikTok in-app browsers) ---- */
    @media (max-width: 480px) {
      .links-page {
        /* Center content vertically + respect iPhone notch / home-bar safe areas */
        justify-content: center;
        padding: calc(env(safe-area-inset-top, 0px) + 2rem) 1.1rem
                 calc(env(safe-area-inset-bottom, 0px) + 1.75rem);
      }
      .links-avatar { width: 92px; height: 92px; }
      .links-name { margin-top: 0.95rem; font-size: 1.45rem; }
      .links-handle { font-size: 0.68rem; }
      .links-bio {
        margin-top: 0.75rem;
        font-size: 0.95rem;
        max-width: 19rem;
      }
      .links-list { margin-top: 1.6rem; gap: 0.75rem; }
      .link-btn {
        min-height: 58px;            /* generous thumb target */
        font-size: 1.02rem;
        border-radius: 13px;
      }
      .links-footer { margin-top: 1.9rem; }
      /* Disable hover-lift on touch devices (no hover state, avoids sticky transform) */
      .link-btn:hover { transform: none; }
      .link-btn--primary:hover {
        box-shadow: 0 10px 28px -10px var(--accent-glow);
      }
      .link-btn--secondary:hover {
        border-color: var(--border-subtle);
        box-shadow: none;
      }
      .link-btn:active { transform: scale(0.97); }
    }

    /* Very small / older phones (e.g. iPhone SE 1st gen, 320px) */
    @media (max-width: 360px) {
      .links-name { font-size: 1.35rem; }
      .link-btn { font-size: 0.96rem; padding-left: 1rem; padding-right: 1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .link-btn, .link-btn:hover, .link-btn:active { transition: none; transform: none; }
    }
  </style>
</head>

<body class="bg-bg-base text-text-primary">
  <main class="links-page">
    <div class="links-wrap">

      <img class="links-avatar" src="assets/javi-portrait.jpg" width="104" height="104"
           alt="Javi Pérez" decoding="async" fetchpriority="high" />

      <h1 class="links-name">Javi Pérez</h1>
      <p class="links-handle">@javiperezbuilds</p>
      <p class="links-bio">Construyo sistemas con IA que facturan. Webs, automatizaciones, prompts y tips para que empieces tú también.</p>

      <!-- Buttons render from the LINKS array below. To add one (Instagram, TikTok…),
           just append an object to the array — no markup changes needed. -->
      <nav class="links-list" id="links-list" aria-label="Mis enlaces">
        <noscript>
          <a class="link-btn link-btn--primary" href="https://t.me/javiperezbuilds7" target="_blank" rel="noopener noreferrer">
            <span class="link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71l-4.14-3.05-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg></span><span class="link-label">Únete a mi Telegram</span>
          </a>
          <a class="link-btn link-btn--secondary" href="index.html">
            <span class="link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></span><span class="link-label">Mis servicios de IA</span>
          </a>
          <a class="link-btn link-btn--secondary" href="https://www.instagram.com/javiperezbuilds/" target="_blank" rel="noopener noreferrer">
            <span class="link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg></span><span class="link-label">Instagram</span>
          </a>
          <a class="link-btn link-btn--secondary" href="https://www.tiktok.com/@javiperezbuilds" target="_blank" rel="noopener noreferrer">
            <span class="link-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.3 2.1 1.6 3.7 3.9 3.9v2.7c-1.3.1-2.5-.2-3.9-1v5.9c0 3.4-2.6 5.6-5.7 5.6-3 0-5.3-2.3-5.3-5.3 0-3.1 2.6-5.5 6-5.1v2.8c-.5-.1-1-.2-1.4-.2-1.4 0-2.4 1-2.4 2.4 0 1.5 1.1 2.5 2.5 2.5 1.5 0 2.6-1.1 2.6-2.9V3h3.2z"/></svg></span><span class="link-label">TikTok</span>
          </a>
        </noscript>
      </nav>

      <p class="links-footer">© <span id="links-year">2026</span> · <a href="index.html">javiperezbuilds.com</a></p>

    </div>
  </main>

  <script>
    // ---- Brand icon SVGs (reused by the render below) ----
    const ICONS = {
      telegram: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71l-4.14-3.05-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>',
      services: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>',
      instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>',
      tiktok: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.3 2.1 1.6 3.7 3.9 3.9v2.7c-1.3.1-2.5-.2-3.9-1v5.9c0 3.4-2.6 5.6-5.7 5.6-3 0-5.3-2.3-5.3-5.3 0-3.1 2.6-5.5 6-5.1v2.8c-.5-.1-1-.2-1.4-.2-1.4 0-2.4 1-2.4 2.4 0 1.5 1.1 2.5 2.5 2.5 1.5 0 2.6-1.1 2.6-2.9V3h3.2z"/></svg>',
    };

    // ---- Edit this list to add / reorder buttons ----
    // type: 'primary' = highlighted (coral) · 'secondary' = outlined card
    // external: true opens in a new tab (target=_blank + rel=noopener)
    // icon: key into ICONS above (add a new SVG there to support more brands)
    const LINKS = [
      { icon: 'telegram',  label: 'Únete a mi Telegram', url: 'https://t.me/javiperezbuilds7', type: 'primary', external: true },
      { icon: 'services',  label: 'Mis servicios de IA', url: 'index.html', type: 'secondary', external: false },
      { icon: 'instagram', label: 'Instagram', url: 'https://www.instagram.com/javiperezbuilds/', type: 'secondary', external: true },
      { icon: 'tiktok',    label: 'TikTok', url: 'https://www.tiktok.com/@javiperezbuilds', type: 'secondary', external: true },
    ];

    (function renderLinks() {
      const list = document.getElementById('links-list');
      if (!list) return;
      list.innerHTML = ''; // replace the <noscript> fallback when JS is available
      for (const item of LINKS) {
        const a = document.createElement('a');
        a.className = 'link-btn link-btn--' + (item.type === 'primary' ? 'primary' : 'secondary');
        a.href = item.url;
        if (item.external) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
        const icon = document.createElement('span');
        icon.className = 'link-icon';
        icon.setAttribute('aria-hidden', 'true');
        icon.innerHTML = ICONS[item.icon] || '';
        const label = document.createElement('span');
        label.className = 'link-label';
        label.textContent = item.label;
        a.append(icon, label);
        list.appendChild(a);
      }
    })();

    document.getElementById('links-year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
