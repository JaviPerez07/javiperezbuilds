<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Javi Pérez — Links | Telegram, servicios de IA y más</title>
  <meta name="description" content="Todos los enlaces de Javi Pérez en un sitio: únete a mi Telegram, descubre mis servicios de IA y webs que facturan. Sistemas con IA, calculadoras y automatizaciones." />
  <link rel="canonical" href="https://javiperezbuilds.com/links" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0A0A0B" />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="author" content="Javi Pérez" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://javiperezbuilds.com/links" />
  <meta property="og:title" content="Javi Pérez — Links" />
  <meta property="og:description" content="Únete a mi Telegram, descubre mis servicios de IA y webs que facturan. Todos mis enlaces en un sitio." />
  <meta property="og:image" content="https://javiperezbuilds.com/assets/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Javi Pérez — sistemas con IA que facturan." />
  <meta property="og:locale" content="es_ES" />
  <meta property="og:site_name" content="Javi Pérez" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Javi Pérez — Links" />
  <meta name="twitter:description" content="Únete a mi Telegram, descubre mis servicios de IA y webs que facturan." />
  <meta name="twitter:image" content="https://javiperezbuilds.com/assets/og-image.jpg" />
  <meta name="twitter:image:alt" content="Javi Pérez — sistemas con IA que facturan." />
  <meta name="twitter:creator" content="@javiperezbuilds" />

  <!-- Fonts (same as home) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="assets/javi-portrait.jpg" fetchpriority="high" />

  <!-- Inherit brand tokens, fonts + body base from the main stylesheet -->
  <link rel="stylesheet" href="styles/custom.css?v=seo4" />

  <!-- Page-specific layout (linktree). Uses the same CSS variables as the home. -->
  <style>
    .links-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(2.5rem, 8vh, 5rem) 1.25rem 3rem;
      position: relative;
      overflow: hidden;
    }
    /* Subtle coral aura behind the avatar, echoing the home's accent glows */
    .links-page::before {
      content: "";
      position: absolute;
      top: -10%;
      left: 50%;
      width: min(560px, 120vw);
      height: 560px;
      transform: translateX(-50%);
      background: radial-gradient(circle, var(--accent-soft) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    .links-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ---- Identity ---- */
    .links-avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-subtle);
      box-shadow: 0 0 0 6px rgba(217, 119, 87, 0.06), 0 18px 40px -12px rgba(0, 0, 0, 0.6);
    }
    .links-name {
      margin-top: 1.1rem;
      font-family: 'Inter', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }
    .links-handle {
      margin-top: 0.3rem;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .links-bio {
      margin-top: 0.85rem;
      max-width: 22rem;
      font-size: 0.98rem;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    /* ---- Button list ---- */
    .links-list {
      margin-top: 2rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      min-height: 56px;
      padding: 0.95rem 1.4rem;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 280ms var(--ease-out-quart),
        box-shadow 280ms var(--ease-out-quart),
        background 280ms ease,
        border-color 280ms ease;
    }
    .link-btn:active { transform: scale(0.985); }
    .link-btn .link-emoji { font-size: 1.15rem; line-height: 1; }

    /* Primary (most prominent) */
    .link-btn--primary {
      background: var(--accent);
      color: var(--bg-base);
      box-shadow: 0 10px 28px -10px var(--accent-glow);
    }
    .link-btn--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px -10px var(--accent-glow), 0 0 48px -12px var(--accent-glow);
    }

    /* Secondary (outlined card, matches site surfaces) */
    .link-btn--secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }
    .link-btn--secondary:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 14px 32px -14px rgba(0, 0, 0, 0.7);
    }

    /* ---- Footer ---- */
    .links-footer {
      margin-top: 2.5rem;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .links-footer a { color: var(--text-secondary); text-decoration: none; }
    .links-footer a:hover { color: var(--accent); }

    @media (prefers-reduced-motion: reduce) {
      .link-btn, .link-btn:hover, .link-btn:active { transition: none; transform: none; }
    }
  </style>
</head>

<body class="bg-bg-base text-text-primary">
  <main class="links-page">
    <div class="links-wrap">

      <img class="links-avatar" src="assets/javi-portrait.jpg" width="104" height="104"
           alt="Javi Pérez" decoding="async" fetchpriority="high" />

      <h1 class="links-name">Javi Pérez</h1>
      <p class="links-handle">@javiperezbuilds</p>
      <p class="links-bio">Construyo sistemas con IA que facturan. Webs, automatizaciones, prompts y tips para que empieces tú también.</p>

      <!-- Buttons render from the LINKS array below. To add one (Instagram, TikTok…),
           just append an object to the array — no markup changes needed. -->
      <nav class="links-list" id="links-list" aria-label="Mis enlaces">
        <noscript>
          <a class="link-btn link-btn--primary" href="https://t.me/javiperezbuilds7" target="_blank" rel="noopener noreferrer">
            <span class="link-emoji" aria-hidden="true">📲</span><span>Únete a mi Telegram</span>
          </a>
          <a class="link-btn link-btn--secondary" href="index.html">
            <span class="link-emoji" aria-hidden="true">🤖</span><span>Mis servicios de IA</span>
          </a>
        </noscript>
      </nav>

      <p class="links-footer">© <span id="links-year">2026</span> · <a href="index.html">javiperezbuilds.com</a></p>

    </div>
  </main>

  <script>
    // ---- Edit this list to add / reorder buttons ----
    // type: 'primary' = highlighted (coral) · 'secondary' = outlined card
    // external: true opens in a new tab (target=_blank + rel=noopener)
    const LINKS = [
      { emoji: '📲', label: 'Únete a mi Telegram', url: 'https://t.me/javiperezbuilds7', type: 'primary', external: true },
      { emoji: '🤖', label: 'Mis servicios de IA', url: 'index.html', type: 'secondary', external: false },
      // Future examples — uncomment & edit when ready:
      // { emoji: '📸', label: 'Instagram', url: 'https://instagram.com/…', type: 'secondary', external: true },
      // { emoji: '🎵', label: 'TikTok',    url: 'https://tiktok.com/@…',   type: 'secondary', external: true },
    ];

    (function renderLinks() {
      const list = document.getElementById('links-list');
      if (!list) return;
      list.innerHTML = ''; // replace the <noscript> fallback when JS is available
      for (const item of LINKS) {
        const a = document.createElement('a');
        a.className = 'link-btn link-btn--' + (item.type === 'primary' ? 'primary' : 'secondary');
        a.href = item.url;
        if (item.external) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
        const emoji = document.createElement('span');
        emoji.className = 'link-emoji';
        emoji.setAttribute('aria-hidden', 'true');
        emoji.textContent = item.emoji;
        const label = document.createElement('span');
        label.textContent = item.label;
        a.append(emoji, label);
        list.appendChild(a);
      }
    })();

    document.getElementById('links-year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
