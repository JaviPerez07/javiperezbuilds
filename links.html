  <!-- Page-specific layout (linktree). Uses the same CSS variables as the home. -->
  <style>
    /* Global box-sizing + no horizontal overflow on this page */
    .links-page, .links-page * { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }

    /* ---- Page shell: vertically centered, safe-area aware top/bottom ---- */
    .links-page {
      min-height: 100svh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 40px)
        0
        calc(env(safe-area-inset-bottom, 0px) + 40px);
      position: relative;
      overflow: hidden;
    }
    /* Subtle coral aura behind the avatar, echoing the home's accent glows */
    .links-page::before {
      content: "";
      position: absolute;
      top: -10%;
      left: 50%;
      width: min(560px, 120vw);
      height: 560px;
      transform: translateX(-50%);
      background: radial-gradient(circle, var(--accent-soft) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ---- Single central container: ONE max-width + ONE side padding.
       Avatar, text and every button live inside and share these exact
       margins, so all left/right edges line up perfectly. ---- */
    .links-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      margin-inline: auto;
      padding-inline: clamp(16px, 5vw, 24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ---- Identity — regular vertical rhythm via consistent margin-top ---- */
    .links-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-subtle);
      box-shadow: 0 0 0 6px rgba(217, 119, 87, 0.06), 0 18px 40px -12px rgba(0, 0, 0, 0.6);
    }
    .links-name {
      margin-top: 18px;
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--text-primary);
    }
    .links-handle {
      margin-top: 6px;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .links-bio {
      margin-top: 14px;
      max-width: 32ch;          /* comfortable line length, never touches edges */
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text-secondary);
    }

    /* ---- Button list: full width of container, uniform gap ---- */
    .links-list {
      margin-top: 28px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    /* Every button shares: 100% width, same min-height, padding, radius */
    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      min-height: 54px;
      padding: 14px 20px;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 280ms var(--ease-out-quart),
        box-shadow 280ms var(--ease-out-quart),
        background 280ms ease,
        border-color 280ms ease;
    }
    .link-btn:active { transform: scale(0.985); }
    /* Icon + label centered together as a group */
    .link-btn .link-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-btn .link-icon svg { display: block; width: 20px; height: 20px; }
    /* Label as a column so an optional sublabel stacks under the main text */
    .link-btn .link-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-align: center;
      line-height: 1.25;
    }
    .link-btn .link-label-sub {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0;
      opacity: 0.85;
    }

    /* === Tier 1 — Primary (Telegram): coral fill, marked glow === */
    .link-btn--primary {
      background: var(--accent);
      color: var(--bg-base);
      box-shadow: 0 10px 28px -10px var(--accent-glow);
    }

    /* === Tier 1 — Feature (Quant Forensics): dark card, strong orange glow
       + accent border so it stands out without copying the coral fill === */
    .link-btn--feature {
      background:
        linear-gradient(180deg, rgba(217,119,87,0.16), rgba(217,119,87,0.05)),
        var(--bg-card);
      color: var(--text-primary);
      border: 1px solid rgba(217,119,87,0.55);
      box-shadow: 0 0 0 1px rgba(217,119,87,0.12), 0 8px 30px -8px var(--accent-glow);
    }
    .link-btn--feature .link-icon { color: var(--accent); }
    .link-btn--feature .link-label-sub { color: var(--accent); opacity: 1; }

    /* === Tier 2 — Secondary: outlined card, subtle accent on rest === */
    .link-btn--secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    /* Hover lift + glow only on devices that actually hover (desktop).
       Hierarchy: feature glow strongest, primary strong, secondary subtle. */
    @media (hover: hover) {
      .link-btn--primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 36px -10px var(--accent-glow), 0 0 48px -12px var(--accent-glow);
      }
      .link-btn--feature:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(217,119,87,0.25), 0 16px 40px -10px var(--accent-glow), 0 0 60px -10px var(--accent-glow);
      }
      .link-btn--secondary:hover {
        transform: translateY(-2px);
        border-color: rgba(217,119,87,0.45);
        box-shadow: 0 10px 26px -12px rgba(0,0,0,0.7), 0 0 22px -8px var(--accent-glow);
      }
    }

    /* ---- Footer ---- */
    .links-footer {
      margin-top: 28px;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .links-footer a { color: var(--text-secondary); text-decoration: none; }
    @media (hover: hover) { .links-footer a:hover { color: var(--accent); } }

    /* ---- Small phones (≤360px): slightly tighter, still uniform ---- */
    @media (max-width: 360px) {
      .links-name { font-size: 1.35rem; }
      .link-btn { font-size: 0.95rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .link-btn, .link-btn:hover, .link-btn:active { transition: none; transform: none; }
    }
  </style>
</head>

          </a>
        </noscript>

      <p class="links-footer">© <span id="links-year">2026</span> · <a href="index.html">javiperezbuilds.com</a></p>

  <script src="scripts/config.js?v=1" defer></script>
  <script src="scripts/founder-counter.js?v=2" defer></script>
  <script>
    // ---- Brand icon SVGs (reused by the render below) ----
    const ICONS = {
      quant: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/><path d="M8 11l2 2 3-4"/></svg>',
      services: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>',
      bolt: '<span style="font-size:18px;line-height:1;">⚡</span>',
      stack: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>',
      whatsapp: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.39 1.26 4.81L2 22l5.41-1.35a9.87 9.87 0 0 0 4.63 1.15h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.64-1.03-5.13-2.9-7C17.17 3.03 14.68 2 12.04 2Zm4.52 12.07c-.2.56-1.18 1.1-1.62 1.14-.44.04-.85.22-2.87-.65-2.42-1.04-4-3.48-4.12-3.64-.12-.17-.99-1.33-.99-2.53s.63-1.78.85-2.03c.22-.25.48-.31.64-.31h.13c.15.01.35-.06.55.41.2.48.68 1.68.75 1.8.06.12.1.26.02.42-.08.16-.12.26-.24.4-.12.14-.25.31-.36.42-.12.12-.24.25-.1.49.14.24.62 1.04 1.34 1.68.92.82 1.7 1.08 1.94 1.2.24.12.38.1.52-.06.14-.16.6-.7.76-.94.16-.24.32-.2.54-.12.22.08 1.4.66 1.64.78.24.12.4.18.46.28.06.1.06.58-.14 1.14Z"/></svg>',
    };

    // ---- Router secundario: jerarquía fija, el primer botón es el dominante ----
    // type: 'primary' = coral (dominante) · 'feature' = glow naranja · 'secondary' = outline
    // external: true abre en pestaña nueva · dataTrack: evento para JP_TRACK (scripts/config.js)
    // dataWa: true = el href de WhatsApp lo centraliza config.js (y trackea el clic)
    const LINKS = [
      { icon: 'quant',    label: 'Tengo un negocio y quiero más citas', url: 'auditoria.html', type: 'primary', external: false, dataTrack: 'cta_audit_click' },
      { icon: 'services', label: 'Ver servicios y casos reales', url: 'index.html#servicios', type: 'secondary', external: false },
      { icon: 'bolt',     label: 'Agentes para Claude Code', sublabel: 'Webs y trading', founderCounter: true, url: 'agentes.html', type: 'feature', external: false },
      { icon: 'stack',    label: 'OperatorStack para ecommerce', url: 'https://getoperatorstack.com', type: 'secondary', external: true },
      { icon: 'whatsapp', label: 'Hablar por WhatsApp', url: 'https://wa.me/34644289776', type: 'secondary', external: true, dataWa: true },
    ];

    (function renderLinks() {
      const list = document.getElementById('links-list');
      if (!list) return;
      list.innerHTML = ''; // replace the <noscript> fallback when JS is available
      for (const item of LINKS) {
        const a = document.createElement('a');
        a.className = 'link-btn link-btn--' + item.type;
        a.href = item.url;
        if (item.external) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
        if (item.dataTrack) a.setAttribute('data-track', item.dataTrack);
        if (item.dataWa) a.setAttribute('data-wa', '');
        const icon = document.createElement('span');
        icon.className = 'link-icon';
        icon.setAttribute('aria-hidden', 'true');
        icon.innerHTML = ICONS[item.icon] || '';
        const labelWrap = document.createElement('span');
        labelWrap.className = 'link-label';
        const main = document.createElement('span');
        main.className = 'link-label-main';
        main.textContent = item.label;
        labelWrap.appendChild(main);
        if (item.sublabel) {
          const sub = document.createElement('span');
          sub.className = 'link-label-sub';
          sub.textContent = item.sublabel;
          if (item.founderCounter) {
            // El texto lo rellena scripts/founder-counter.js (única fuente de verdad)
            sub.textContent += ' · ';
            const fc = document.createElement('span');
            fc.className = 'founder-counter';
            fc.setAttribute('data-format', 'short');
            fc.textContent = 'Precio fundador · hasta 15 jul';
            sub.appendChild(fc);
          }
          labelWrap.appendChild(sub);
        }
        a.append(icon, labelWrap);
        list.appendChild(a);
      }
    })();

    document.getElementById('links-year').textContent = new Date().getFullYear();
  </script>
